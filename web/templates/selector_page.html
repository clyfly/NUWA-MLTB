<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clyfly Bot - Torrent Selector</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* ── CSS Variables for theming ── */
        :root {
            --transition: 0.4s ease;
        }

        [data-theme="dark"] {
            --bg-base: linear-gradient(135deg, #0d1117 0%, #161e2e 50%, #0d1117 100%);
            --bg-surface: rgba(22, 30, 46, 0.85);
            --bg-surface-hover: rgba(30, 40, 62, 0.95);
            --bg-input: rgba(255,255,255,0.06);
            --bg-input-focus: rgba(99,102,241,0.12);
            --bg-stats: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.1);
            --border-hover: rgba(255,255,255,0.18);
            --border-focus: rgba(99,102,241,0.5);
            --text-primary: #e8eaf0;
            --text-secondary: #8b93a7;
            --text-muted: #5a6478;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --accent-glow: rgba(99,102,241,0.25);
            --header-bg: rgba(10, 14, 26, 0.9);
            --footer-bg: rgba(10, 14, 26, 0.9);
            --shadow: 0 8px 40px rgba(0,0,0,0.4);
            --shadow-card: 0 2px 20px rgba(0,0,0,0.3);
            --overlay: radial-gradient(ellipse at 15% 40%, rgba(99,102,241,0.08) 0%, transparent 55%),
                        radial-gradient(ellipse at 85% 75%, rgba(139,92,246,0.06) 0%, transparent 55%);
        }

        [data-theme="light"] {
            --bg-base: linear-gradient(135deg, #e8eaf6 0%, #ede7f6 50%, #e3f2fd 100%);
            --bg-surface: rgba(255,255,255,0.52);
            --bg-surface-hover: rgba(255,255,255,0.72);
            --bg-input: rgba(255,255,255,0.45);
            --bg-input-focus: rgba(99,102,241,0.1);
            --bg-stats: rgba(255,255,255,0.38);
            --border: rgba(255,255,255,0.75);
            --border-hover: rgba(255,255,255,0.95);
            --border-focus: rgba(99,102,241,0.45);
            --text-primary: #1a1f2e;
            --text-secondary: #4a526a;
            --text-muted: #8a94aa;
            --accent: #4f52e0;
            --accent-hover: #6366f1;
            --accent-glow: rgba(99,102,241,0.2);
            --header-bg: rgba(255,255,255,0.55);
            --footer-bg: rgba(255,255,255,0.55);
            --shadow: 0 8px 40px rgba(99,102,241,0.12);
            --shadow-card: 0 4px 24px rgba(99,102,241,0.08);
            --overlay: radial-gradient(ellipse at 15% 40%, rgba(99,102,241,0.12) 0%, transparent 55%),
                        radial-gradient(ellipse at 85% 75%, rgba(139,92,246,0.1) 0%, transparent 55%);
        }

        /* ── Reset & Base ── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            transition: background var(--transition), color var(--transition);
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: var(--overlay);
            pointer-events: none;
            z-index: 0;
            transition: background var(--transition);
        }

        /* ── Header ── */
        header {
            background: var(--header-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 1.1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            transition: background var(--transition), border-color var(--transition);
        }

        .brand-logo {
            font-size: 1.45rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 0.45rem;
        }

        .brand-logo span.bolt {
            font-size: 1.2rem;
            filter: drop-shadow(0 0 6px var(--accent-glow));
        }

        /* ── Theme Toggle ── */
        .theme-toggle-wrap {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.3rem 0.75rem;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }

        .theme-toggle-wrap:hover {
            border-color: var(--border-hover);
            background: var(--bg-surface-hover);
        }

        .theme-icon {
            font-size: 1rem;
            transition: transform 0.5s ease, opacity 0.3s ease;
        }

        .theme-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
        }

        /* ── Card ── */
        .card {
            background: var(--bg-surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            box-shadow: var(--shadow-card);
            transition: background var(--transition), border-color var(--transition), box-shadow var(--transition);
        }

        /* ── Main ── */
        main {
            position: relative;
            z-index: 1;
            flex: 1;
        }

        /* ── PIN Entry ── */
        #pinEntry {
            max-width: 400px;
            margin: 0 auto;
        }

        .pin-title {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--text-primary);
            margin-bottom: 0.35rem;
        }

        .pin-subtitle {
            font-size: 0.88rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        /* ── Inputs ── */
        input[type="text"],
        input[type="password"],
        .edit-name-input {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 0.875rem;
            color: var(--text-primary);
            padding: 0.875rem 1.1rem;
            font-size: 0.95rem;
            font-family: 'DM Sans', sans-serif;
            transition: all 0.3s ease;
            outline: none;
            margin-bottom: 1rem;
        }

        input[type="text"]::placeholder,
        input[type="password"]::placeholder {
            color: var(--text-muted);
        }

        input[type="text"]:focus,
        input[type="password"]:focus,
        .edit-name-input:focus {
            border-color: var(--border-focus);
            background: var(--bg-input-focus);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        /* ── Buttons ── */
        .btn {
            padding: 0.72rem 1.4rem;
            border-radius: 0.875rem;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            transition: all 0.25s ease;
            border: none;
            letter-spacing: 0.2px;
        }

        .btn:hover { transform: translateY(-1px); }
        .btn:active { transform: translateY(0); }

        .btn-primary {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            box-shadow: 0 6px 24px var(--accent-glow);
        }

        .btn-ghost {
            background: var(--bg-input);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-ghost:hover {
            background: var(--bg-surface-hover);
            border-color: var(--border-hover);
            color: var(--text-primary);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .btn-full { width: 100%; }

        /* ── Action Bar ── */
        .action-bar {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 0.65rem;
            margin-bottom: 1.25rem;
        }

        @media (max-width: 560px) {
            .action-bar {
                grid-template-columns: 1fr 1fr;
            }
        }

        .action-bar .btn-submit {
            grid-column: span 1;
        }

        @media (max-width: 560px) {
            .action-bar .btn-submit {
                grid-column: span 2;
            }
        }

        /* ── Stats Box ── */
        .stats-box {
            background: var(--bg-stats);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 0.9rem 1.2rem;
            margin-bottom: 1.25rem;
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            transition: background var(--transition), border-color var(--transition);
        }

        .stats-box .stat {
            display: flex;
            flex-direction: column;
            gap: 0.1rem;
        }

        .stats-box .stat-label {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--text-muted);
        }

        .stats-box .stat-value {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
            font-family: 'DM Mono', monospace;
        }

        .stats-box .stat-value span.accent {
            color: var(--accent);
        }

        /* ── File Tree ── */
        #fileTree {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .file-tree-item {
            display: flex;
            align-items: center;
            padding: 0.7rem 0.9rem;
            border-radius: 0.75rem;
            border: 1px solid transparent;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .file-tree-item:hover {
            background: var(--bg-surface-hover);
            border-color: var(--border);
        }

        .file-tree-item.back-btn {
            color: var(--accent);
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 0.35rem;
        }

        .file-tree-item.back-btn:hover {
            background: var(--bg-input-focus);
            border-color: var(--border-focus);
        }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            flex-shrink: 0;
        }

        input[type="checkbox"] {
            width: 17px;
            height: 17px;
            cursor: pointer;
            accent-color: var(--accent);
            margin-bottom: 0;
            border-radius: 4px;
        }

        .item-icon {
            margin: 0 0.6rem;
            font-size: 1.1rem;
            flex-shrink: 0;
        }

        .file-info {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            min-width: 0;
        }

        .file-name {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-primary);
            word-break: break-word;
            overflow-wrap: break-word;
            line-height: 1.3;
        }

        .folder-name {
            color: var(--accent);
            font-weight: 600;
        }

        .size-info {
            font-size: 0.78rem;
            color: var(--text-muted);
            font-family: 'DM Mono', monospace;
            margin-top: 0.15rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .edit-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.75rem;
            color: var(--text-muted);
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            padding: 0;
            transition: color 0.2s ease;
            letter-spacing: 0.2px;
        }

        .edit-btn:hover {
            color: var(--accent);
        }

        /* ── Modal ── */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.25s ease;
        }

        .modal-content {
            background: var(--bg-surface);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 1.5rem;
            padding: 2rem;
            width: 90%;
            max-width: 460px;
            box-shadow: var(--shadow);
            animation: slideUp 0.3s ease;
            transition: background var(--transition), border-color var(--transition);
        }

        .modal-title {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.75rem;
        }

        .modal-body {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .modal-footer {
            display: flex;
            gap: 0.6rem;
            justify-content: flex-end;
        }

        /* ── Footer ── */
        footer {
            background: var(--footer-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            padding: 1.5rem 0;
            position: relative;
            z-index: 10;
            transition: background var(--transition), border-color var(--transition);
        }

        .footer-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .footer-copy {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .social-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.95rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .social-button:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            transform: scale(1.1) translateY(-2px);
            box-shadow: 0 6px 20px var(--accent-glow);
        }

        /* ── Animations ── */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(16px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .pin-entry {
            animation: slideUp 0.4s ease;
        }

        .fadeOut {
            animation: fadeOut 0.4s ease forwards;
        }

        @keyframes fadeOut {
            to { opacity: 0; transform: translateY(-10px); }
        }

        /* ── Breadcrumb ── */
        .breadcrumb {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.3rem;
            margin-bottom: 1rem;
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .breadcrumb-item {
            cursor: pointer;
            color: var(--text-muted);
            transition: color 0.2s ease;
            padding: 0.2rem 0.35rem;
            border-radius: 0.4rem;
        }

        .breadcrumb-item:hover {
            color: var(--accent);
            background: var(--bg-input-focus);
        }

        .breadcrumb-item.active {
            color: var(--text-primary);
            cursor: default;
        }

        .breadcrumb-item.active:hover {
            background: none;
        }

        .breadcrumb-sep {
            color: var(--text-muted);
            font-size: 0.75rem;
            opacity: 0.5;
        }

        /* ── Search ── */
        .search-wrap {
            position: relative;
            margin-bottom: 1rem;
        }

        .search-wrap .search-icon {
            position: absolute;
            left: 0.9rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.85rem;
            pointer-events: none;
        }

        .search-wrap input {
            padding-left: 2.4rem;
            padding-right: 2.4rem;
            margin-bottom: 0;
        }

        .search-clear {
            position: absolute;
            right: 0.9rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 0.85rem;
            padding: 0;
            display: none;
            transition: color 0.2s ease;
        }

        .search-clear:hover { color: var(--text-primary); }

        .search-empty {
            text-align: center;
            padding: 2.5rem 1rem;
            color: var(--text-muted);
            font-size: 0.88rem;
        }

        .search-empty .emoji { font-size: 2rem; display: block; margin-bottom: 0.5rem; }

        /* ── Section Heading ── */
        .section-heading {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: var(--text-primary);
            margin-bottom: 1.25rem;
        }

        /* ── Divider ── */
        .divider {
            height: 1px;
            background: var(--border);
            margin: 1rem 0;
        }

        @media (max-width: 640px) {
            .card { border-radius: 1.25rem; }
            .modal-content { padding: 1.5rem; }
        }
    </style>
</head>

<body>
    <!-- Header -->
    <header>
        <div class="container mx-auto px-4">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div class="brand-logo">
                    <span class="bolt">⚡</span>
                    <span>Clyfly Bot</span>
                </div>
                <div class="theme-toggle-wrap" id="themeToggle" title="Toggle theme">
                    <span class="theme-icon" id="themeIcon">🌙</span>
                    <span class="theme-label" id="themeLabel">Dark</span>
                </div>
            </div>
        </div>
    </header>

    <!-- Main -->
    <main class="container mx-auto p-4 py-8">

        <!-- PIN Entry -->
        <div id="pinEntry" class="card p-8 pin-entry" style="max-width:400px; margin:0 auto;">
            <h2 class="pin-title text-center">Welcome Back</h2>
            <p class="pin-subtitle text-center">Enter your PIN to access torrent files</p>
            <input type="text" id="pinInput" placeholder="Enter PIN" autocomplete="off">
            <button id="submitPin" class="btn btn-primary btn-full" style="margin-top:0.25rem;">
                Continue →
            </button>
        </div>

        <!-- File Manager -->
        <div id="fileManager" class="card p-6 hidden" style="max-width:760px; margin:0 auto;">
            <h2 class="section-heading">Select Files</h2>

            <!-- Action Bar -->
            <div class="action-bar">
                <button id="selectAllBtn" class="btn btn-ghost">This Folder</button>
                <button id="invertSelectionBtn" class="btn btn-ghost">Invert</button>
                <button id="selectEverythingBtn" class="btn btn-ghost">All Files</button>
                <button id="submitBtn" class="btn btn-primary btn-submit">
                    Submit
                </button>
            </div>

            <!-- Stats -->
            <div class="stats-box">
                <div class="stat">
                    <span class="stat-label">Selected</span>
                    <span class="stat-value"><span id="selectedCount" class="accent">0</span> / <span id="totalCount">0</span></span>
                </div>
                <div class="stat">
                    <span class="stat-label">Size</span>
                    <span class="stat-value"><span id="selectedSize" class="accent">0 B</span> / <span id="totalSize">0 B</span></span>
                </div>
            </div>

            <!-- Breadcrumb -->
            <div id="breadcrumb" class="breadcrumb" style="display:none;"></div>

            <!-- Search -->
            <div class="search-wrap">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="searchInput" placeholder="Search files..." autocomplete="off" style="margin-bottom:0;">
                <button class="search-clear" id="searchClear">✕</button>
            </div>

            <!-- File Tree -->
            <div id="fileTree"></div>
        </div>

    </main>

    <!-- Footer -->
    <footer>
        <div class="container mx-auto px-4">
            <div class="footer-inner">
                <p class="footer-copy">© 2024–2025 Clyfly Bot. All rights reserved.</p>
                <div style="display:flex; gap:0.5rem;">
                    <a href="https://github.com/anasty17/mirror-leech-telegram-bot" target="_blank" class="social-button" title="GitHub">
                        <i class="fab fa-github"></i>
                    </a>
                    <a href="https://www.instagram.com" target="_blank" class="social-button" title="Instagram">
                        <i class="fab fa-instagram"></i>
                    </a>
                </div>
            </div>
        </div>
    </footer>

    <!-- Modal -->
    <div id="reusableModal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle" class="modal-title"></h2>
            <div id="modalBody" class="modal-body"></div>
            <div id="modalFooter" class="modal-footer"></div>
        </div>
    </div>

    <script>
        // ── Theme ──────────────────────────────────────────────────────────────
        const html = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');
        const themeLabel = document.getElementById('themeLabel');

        function applyTheme(isDark) {
            html.setAttribute('data-theme', isDark ? 'dark' : 'light');
            themeIcon.textContent = isDark ? '🌙' : '☀️';
            themeLabel.textContent = isDark ? 'Dark' : 'Light';
            localStorage.setItem('darkMode', isDark);
        }

        function loadTheme() {
            const saved = localStorage.getItem('darkMode');
            const isDark = saved !== null ? saved === 'true' : true;
            applyTheme(isDark);
        }

        themeToggle.addEventListener('click', () => {
            const isDark = html.getAttribute('data-theme') === 'dark';
            themeIcon.style.transform = 'rotate(360deg)';
            setTimeout(() => { themeIcon.style.transform = ''; }, 500);
            applyTheme(!isDark);
        });

        loadTheme();

        const searchInput = document.getElementById('searchInput');
        const searchClear = document.getElementById('searchClear');
        const breadcrumbEl = document.getElementById('breadcrumb');

        // ── Breadcrumb ─────────────────────────────────────────────────────────
        let folderStack = []; // track navigation path

        function updateBreadcrumb() {
            if (folderStack.length === 0) {
                breadcrumbEl.style.display = 'none';
                return;
            }
            breadcrumbEl.style.display = 'flex';
            breadcrumbEl.innerHTML = '';

            // Root
            const root = document.createElement('span');
            root.className = 'breadcrumb-item';
            root.textContent = '⚡ Root';
            root.addEventListener('click', () => {
                folderStack = [];
                currentFolder = null;
                searchInput.value = '';
                searchClear.style.display = 'none';
                updateBreadcrumb();
                renderFileTree(files);
                updateStats();
            });
            breadcrumbEl.appendChild(root);

            folderStack.forEach((folder, i) => {
                const sep = document.createElement('span');
                sep.className = 'breadcrumb-sep';
                sep.textContent = '›';
                breadcrumbEl.appendChild(sep);

                const item = document.createElement('span');
                item.className = i === folderStack.length - 1 ? 'breadcrumb-item active' : 'breadcrumb-item';
                item.textContent = folder.name;

                if (i < folderStack.length - 1) {
                    item.addEventListener('click', () => {
                        folderStack = folderStack.slice(0, i + 1);
                        currentFolder = folder;
                        searchInput.value = '';
                        searchClear.style.display = 'none';
                        updateBreadcrumb();
                        renderFileTree(folder.children);
                        updateStats();
                    });
                }
                breadcrumbEl.appendChild(item);
            });
        }

        // ── Search ─────────────────────────────────────────────────────────────
        let searchQuery = '';

        function searchAllFiles(nodes, query) {
            const results = [];
            const q = query.toLowerCase();
            const queue = [...nodes];
            while (queue.length) {
                const node = queue.pop();
                if (node.type === 'file' && node.name.toLowerCase().includes(q)) {
                    results.push(node);
                }
                if (node.children) queue.push(...node.children);
            }
            return results;
        }

        searchInput.addEventListener('input', () => {
            searchQuery = searchInput.value.trim();
            searchClear.style.display = searchQuery ? 'block' : 'none';
            if (searchQuery) {
                const results = searchAllFiles(currentFolder ? currentFolder.children : files, searchQuery);
                renderSearchResults(results, searchQuery);
            } else {
                renderFileTree(currentFolder ? currentFolder.children : files);
            }
        });

        searchClear.addEventListener('click', () => {
            searchInput.value = '';
            searchQuery = '';
            searchClear.style.display = 'none';
            renderFileTree(currentFolder ? currentFolder.children : files);
            searchInput.focus();
        });

        function highlightText(text, query) {
            if (!query) return text;
            const idx = text.toLowerCase().indexOf(query.toLowerCase());
            if (idx === -1) return text;
            return (
                text.slice(0, idx) +
                `<mark style="background:var(--accent-glow);color:var(--accent);border-radius:3px;padding:0 2px;">${text.slice(idx, idx + query.length)}</mark>` +
                text.slice(idx + query.length)
            );
        }

        function renderSearchResults(results, query) {
            fileTree.innerHTML = '';
            if (results.length === 0) {
                fileTree.innerHTML = `
                    <div class="search-empty">
                        <span class="emoji">🔍</span>
                        No files matching <strong>"${query}"</strong>
                    </div>`;
                return;
            }

            results.forEach(node => {
                const item = document.createElement('div');
                item.className = 'file-tree-item';

                const cbWrap = document.createElement('div');
                cbWrap.className = 'checkbox-wrapper';
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.checked = node.selected;
                cb.addEventListener('change', () => {
                    node.selected = cb.checked;
                    updateStats();
                });
                cbWrap.appendChild(cb);

                const icon = document.createElement('span');
                icon.className = 'item-icon';
                icon.textContent = '📄';

                const info = document.createElement('div');
                info.className = 'file-info';

                const nameEl = document.createElement('div');
                nameEl.className = 'file-name';
                nameEl.innerHTML = highlightText(node.name, query);

                const sizeEl = document.createElement('div');
                sizeEl.className = 'size-info';
                sizeEl.textContent = formatSize(node.size);

                info.appendChild(nameEl);
                info.appendChild(sizeEl);
                item.appendChild(cbWrap);
                item.appendChild(icon);
                item.appendChild(info);

                item.addEventListener('click', (e) => {
                    if (e.target === cb) return;
                    node.selected = !node.selected;
                    cb.checked = node.selected;
                    updateStats();
                });

                fileTree.appendChild(item);
            });
        }


        const fileTree = document.getElementById('fileTree');
        const selectedCountEl = document.getElementById('selectedCount');
        const totalCountEl = document.getElementById('totalCount');
        const selectedSizeEl = document.getElementById('selectedSize');
        const totalSizeEl = document.getElementById('totalSize');
        const selectAllBtn = document.getElementById('selectAllBtn');
        const invertSelectionBtn = document.getElementById('invertSelectionBtn');
        const selectEverythingBtn = document.getElementById('selectEverythingBtn');
        const submitBtn = document.getElementById('submitBtn');
        const pinEntry = document.getElementById('pinEntry');
        const pinInput = document.getElementById('pinInput');
        const submitPin = document.getElementById('submitPin');
        const fileManager = document.getElementById('fileManager');
        const reusableModal = document.getElementById('reusableModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalBody = document.getElementById('modalBody');
        const modalFooter = document.getElementById('modalFooter');

        pinInput.focus();

        const urlParams = new Proxy(new URLSearchParams(window.location.search), {
            get: (sp, prop) => sp.get(prop),
        });

        if (urlParams.pin) {
            pinInput.value = urlParams.pin;
            setTimeout(() => submitPin.click(), 0);
        }

        let currentFolder = null;
        let files = [];
        let allowEdit = false;

        // ── Modal ──────────────────────────────────────────────────────────────
        function openModal() {
            reusableModal.style.display = 'flex';
        }

        function closeModal() {
            reusableModal.style.display = 'none';
        }

        reusableModal.addEventListener('click', (e) => {
            if (e.target === reusableModal) closeModal();
        });

        // ── Utilities ──────────────────────────────────────────────────────────
        function formatSize(size) {
            const units = ['B', 'KB', 'MB', 'GB', 'TB'];
            let i = 0;
            while (size >= 1024 && i < units.length - 1) { size /= 1024; i++; }
            return `${size.toFixed(2)} ${units[i]}`;
        }

        function calculateFolderSize(folder) {
            let total = 0;
            const queue = [folder];
            while (queue.length) {
                const node = queue.pop();
                if (node.type === 'file') total += node.size;
                else if (node.children) queue.push(...node.children);
            }
            return total;
        }

        function areAllChildrenSelected(folder) {
            return folder.children.every(c => c.type === 'folder' ? areAllChildrenSelected(c) : c.selected);
        }

        function areSomeChildrenSelected(folder) {
            return folder.children.some(c => c.type === 'folder' ? areSomeChildrenSelected(c) : c.selected);
        }

        // ── Find Parent (supports multi-root) ─────────────────────────────────
        function findParentInTree(root, id) {
            if (root.children) {
                for (const child of root.children) {
                    if (child.id === id) return root;
                    const found = findParentInTree(child, id);
                    if (found) return found;
                }
            }
            return null;
        }

        function findParent(id) {
            for (const root of files) {
                const found = findParentInTree(root, id);
                if (found) return found;
            }
            return null;
        }

        // ── Stats ─────────────────────────────────────────────────────────────
        function calculateStats(nodes) {
            let selCount = 0, totCount = 0, selSize = 0, totSize = 0;
            const queue = [...nodes];
            while (queue.length) {
                const node = queue.pop();
                if (node.type === 'file') {
                    totCount++; totSize += node.size;
                    if (node.selected) { selCount++; selSize += node.size; }
                }
                if (node.children) queue.push(...node.children);
            }
            return { selCount, totCount, selSize, totSize };
        }

        function updateStats() {
            const s = calculateStats(files);
            selectedCountEl.textContent = s.selCount;
            totalCountEl.textContent = s.totCount;
            selectedSizeEl.textContent = formatSize(s.selSize);
            totalSizeEl.textContent = formatSize(s.totSize);
        }

        // ── Render ─────────────────────────────────────────────────────────────
        function renderFileTree(nodes) {
            fileTree.innerHTML = '';

            if (currentFolder) {
                const back = document.createElement('div');
                back.className = 'file-tree-item back-btn';
                back.innerHTML = `<span style="margin-right:0.5rem;">←</span> Back`;
                back.addEventListener('click', goBack);
                fileTree.appendChild(back);

                const div = document.createElement('div');
                div.className = 'divider';
                fileTree.appendChild(div);
            }

            nodes.forEach(node => {
                const item = document.createElement('div');
                item.className = 'file-tree-item';

                // Checkbox
                const cbWrap = document.createElement('div');
                cbWrap.className = 'checkbox-wrapper';
                const cb = document.createElement('input');
                cb.type = 'checkbox';
                cb.id = node.id;
                cb.checked = node.selected;
                if (node.type === 'folder') {
                    if (areAllChildrenSelected(node)) cb.checked = true;
                    else if (areSomeChildrenSelected(node)) cb.indeterminate = true;
                    else cb.checked = false;
                }
                cb.addEventListener('change', () => toggleFile(node));
                cbWrap.appendChild(cb);

                // Icon
                const icon = document.createElement('span');
                icon.className = 'item-icon';
                icon.textContent = node.type === 'folder' ? '📁' : '📄';

                // Info
                const info = document.createElement('div');
                info.className = 'file-info';

                const nameEl = document.createElement('div');
                nameEl.className = node.type === 'folder' ? 'file-name folder-name' : 'file-name';
                nameEl.textContent = node.name;

                const sizeEl = document.createElement('div');
                sizeEl.className = 'size-info';
                const sz = node.type === 'folder' ? calculateFolderSize(node) : node.size;
                sizeEl.textContent = formatSize(sz);

                if (node.type === 'file' && node.progress !== undefined) {
                    const prog = document.createElement('span');
                    prog.textContent = `• ${node.progress}%`;
                    sizeEl.appendChild(prog);
                }

                if (allowEdit) {
                    const editBtn = document.createElement('button');
                    editBtn.className = 'edit-btn';
                    editBtn.textContent = '✏️ rename';
                    editBtn.addEventListener('click', (e) => { e.stopPropagation(); openEditFileNameModal(node); });
                    sizeEl.appendChild(editBtn);
                }

                info.appendChild(nameEl);
                info.appendChild(sizeEl);

                item.appendChild(cbWrap);
                item.appendChild(icon);
                item.appendChild(info);

                // Click behavior
                item.addEventListener('click', (e) => {
                    if (e.target === cb || e.target.classList.contains('edit-btn')) return;
                    if (node.type === 'folder' && e.target === nameEl) {
                        openFolder(node);
                    } else {
                        toggleFile(node);
                    }
                });

                if (node.type === 'folder') {
                    nameEl.style.cursor = 'pointer';
                    nameEl.addEventListener('click', (e) => { e.stopPropagation(); openFolder(node); });
                }

                fileTree.appendChild(item);
            });

            updateSelectAllButtonText();
            updateSelectEverythingButtonText();
        }

        // ── Toggle ─────────────────────────────────────────────────────────────
        function toggleFile(node) {
            if (node.type === 'folder') {
                toggleFolder(node, !areAllChildrenSelected(node));
            } else {
                node.selected = !node.selected;
            }
            updateStats();
            renderFileTree(currentFolder ? currentFolder.children : files);
        }

        function toggleFolder(folder, isSelected) {
            folder.selected = isSelected;
            const queue = [folder];
            while (queue.length) {
                const n = queue.pop();
                n.selected = isSelected;
                if (n.children) queue.push(...n.children);
            }
        }

        // ── Navigation ────────────────────────────────────────────────────────
        function openFolder(folder) {
            currentFolder = folder;
            folderStack.push(folder);
            searchInput.value = '';
            searchQuery = '';
            searchClear.style.display = 'none';
            updateBreadcrumb();
            renderFileTree(folder.children);
        }

        function goBack() {
            if (!currentFolder) return;
            folderStack.pop();
            const parent = folderStack.length > 0 ? folderStack[folderStack.length - 1] : null;
            currentFolder = parent;
            searchInput.value = '';
            searchQuery = '';
            searchClear.style.display = 'none';
            updateBreadcrumb();
            renderFileTree(parent ? parent.children : files);
            updateStats();
        }

        // ── Select Actions ────────────────────────────────────────────────────
        function selectAll() {
            const nodes = currentFolder ? currentFolder.children : files;
            const allSel = nodes.every(n => n.type === 'folder' ? areAllChildrenSelected(n) : n.selected);
            nodes.forEach(n => n.type === 'folder' ? toggleFolder(n, !allSel) : (n.selected = !allSel));
            updateStats();
            renderFileTree(nodes);
        }

        function invertSelection() {
            const nodes = currentFolder ? currentFolder.children : files;
            function invertNode(n) {
                if (n.type === 'file') { n.selected = !n.selected; }
                else if (n.children) { n.children.forEach(invertNode); }
            }
            nodes.forEach(invertNode);
            updateStats();
            renderFileTree(nodes);
        }

        function selectEverything() {
            const s = calculateStats(files);
            const allSel = s.selCount === s.totCount && s.totCount > 0;
            function recurse(nodes, val) {
                nodes.forEach(n => { n.selected = val; if (n.children) recurse(n.children, val); });
            }
            recurse(files, !allSel);
            updateStats();
            renderFileTree(currentFolder ? currentFolder.children : files);
        }

        // ── Button Labels ─────────────────────────────────────────────────────
        function updateSelectAllButtonText() {
            const nodes = currentFolder ? currentFolder.children : files;
            const allSel = nodes.every(n => n.type === 'folder' ? areAllChildrenSelected(n) : n.selected);
            selectAllBtn.textContent = allSel ? 'Deselect Folder' : 'This Folder';
        }

        function updateSelectEverythingButtonText() {
            const s = calculateStats(files);
            const allSel = s.selCount === s.totCount && s.totCount > 0;
            selectEverythingBtn.textContent = allSel ? 'Deselect All' : 'All Files';
        }

        // ── Path Utility ──────────────────────────────────────────────────────
        function getFullPath(node) {
            const path = [];
            let parent = findParent(node.id);
            while (parent) {
                path.unshift(parent.name);
                parent = findParent(parent.id);
            }
            return path.join('/');
        }

        // ── Edit Modal ────────────────────────────────────────────────────────
        function openEditFileNameModal(node) {
            modalTitle.textContent = `Rename ${node.type === 'folder' ? 'Folder' : 'File'}`;
            modalBody.innerHTML = `<input type="text" id="editNameInput" class="edit-name-input" value="">`;
            const editInput = document.getElementById('editNameInput');
            editInput.value = node.name;

            modalFooter.innerHTML = '';
            const cancelBtn = document.createElement('button');
            cancelBtn.className = 'btn btn-ghost';
            cancelBtn.textContent = 'Cancel';
            cancelBtn.onclick = closeModal;

            const saveBtn = document.createElement('button');
            saveBtn.className = 'btn btn-primary';
            saveBtn.textContent = 'Save';
            saveBtn.onclick = () => {
                const newName = editInput.value.trim();
                if (!newName || newName === node.name) { closeModal(); return; }
                closeModal();
                const fullPath = getFullPath(node);
                fetch(`/app/files/torrent?gid=${urlParams.gid}&pin=${pinInput.value}&mode=rename`, {
                    method: 'POST',
                    body: JSON.stringify({
                        old_path: fullPath ? `${fullPath}/${node.name}` : node.name,
                        new_path: fullPath ? `${fullPath}/${newName}` : newName,
                        type: node.type,
                    }),
                }).then(res => {
                    if (res.ok) {
                        node.name = newName;
                        renderFileTree(currentFolder ? currentFolder.children : files);
                        modalTitle.textContent = '✅ Renamed!';
                        modalBody.innerHTML = '<p>File renamed successfully.</p>';
                    } else {
                        modalTitle.textContent = '❌ Error';
                        modalBody.innerHTML = '<p>Could not rename. Please try again.</p>';
                    }
                    modalFooter.innerHTML = '';
                    const ok = document.createElement('button');
                    ok.className = 'btn btn-primary';
                    ok.textContent = 'Okay';
                    ok.onclick = closeModal;
                    modalFooter.appendChild(ok);
                    openModal();
                });
            };

            editInput.addEventListener('keypress', e => { if (e.key === 'Enter') saveBtn.click(); });

            modalFooter.appendChild(cancelBtn);
            modalFooter.appendChild(saveBtn);
            openModal();
            setTimeout(() => {
                editInput.focus();
                editInput.setSelectionRange(editInput.value.length, editInput.value.length);
            }, 50);
        }

        // ── Submit ────────────────────────────────────────────────────────────
        function submitData() {
            const s = calculateStats(files);
            if (s.selCount === 0) {
                modalTitle.textContent = '⚠️ Nothing Selected';
                modalBody.innerHTML = '<p>Please select at least one file to proceed.</p>';
                modalFooter.innerHTML = '';
                const ok = document.createElement('button');
                ok.className = 'btn btn-primary'; ok.textContent = 'Got it'; ok.onclick = closeModal;
                modalFooter.appendChild(ok);
                openModal();
                return;
            }
            modalTitle.textContent = '⏳ Submitting…';
            modalBody.innerHTML = `<p>Sending <strong>${s.selCount}</strong> file(s)…</p>`;
            modalFooter.innerHTML = '';
            openModal();

            fetch(`/app/files/torrent?gid=${urlParams.gid}&pin=${pinInput.value}&mode=selection`, {
                method: 'POST',
                body: JSON.stringify(files),
            }).then(res => {
                closeModal();
                modalTitle.textContent = res.ok ? '✅ Done!' : '❌ Error';
                modalBody.innerHTML = res.ok
                    ? '<p>Your selection was submitted successfully.</p>'
                    : '<p>An error occurred. Please try again.</p>';
                const ok = document.createElement('button');
                ok.className = 'btn btn-primary'; ok.textContent = 'Okay'; ok.onclick = closeModal;
                modalFooter.innerHTML = '';
                modalFooter.appendChild(ok);
                openModal();
            });
        }

        // ── PIN Submit ────────────────────────────────────────────────────────
        pinInput.addEventListener('keypress', e => { if (e.key === 'Enter') submitPin.click(); });

        submitPin.addEventListener('click', () => {
            pinInput.blur();
            if (!pinInput.value) {
                modalTitle.textContent = '⚠️ Missing PIN';
                modalBody.innerHTML = '<p>Please enter your PIN to continue.</p>';
                modalFooter.innerHTML = '';
                const ok = document.createElement('button');
                ok.className = 'btn btn-primary'; ok.textContent = 'Try Again'; ok.onclick = closeModal;
                modalFooter.appendChild(ok);
                openModal();
                return;
            }
            if (!urlParams.gid) {
                modalTitle.textContent = '⚠️ Missing Parameter';
                modalBody.innerHTML = '<p>The <strong>gid</strong> parameter is missing from the URL.</p>';
                modalFooter.innerHTML = '';
                const ok = document.createElement('button');
                ok.className = 'btn btn-primary'; ok.textContent = 'Okay'; ok.onclick = closeModal;
                modalFooter.appendChild(ok);
                openModal();
                return;
            }

            submitPin.textContent = '…';
            submitPin.disabled = true;

            fetch(`/app/files/torrent?gid=${urlParams.gid}&pin=${pinInput.value}&mode=get`)
                .then(res => {
                    if (res.ok) {
                        return res.json().then(data => {
                            if (data.error) {
                                modalTitle.textContent = '❌ ' + data.error;
                                modalBody.innerHTML = `<p>${data.message}. Please try again.</p>`;
                                modalFooter.innerHTML = '';
                                const ok = document.createElement('button');
                                ok.className = 'btn btn-primary'; ok.textContent = 'Retry'; ok.onclick = closeModal;
                                modalFooter.appendChild(ok);
                                openModal();
                            } else {
                                files = data.files;
                                allowEdit = data.engine === 'qbittorrent';
                                folderStack = [];
                                searchInput.value = '';
                                searchQuery = '';
                                pinEntry.classList.add('fadeOut');
                                setTimeout(() => {
                                    pinEntry.style.display = 'none';
                                    fileManager.classList.remove('hidden');
                                    updateBreadcrumb();
                                    renderFileTree(files);
                                    updateStats();
                                }, 400);
                            }
                        });
                    } else {
                        modalTitle.textContent = '❌ Connection Error';
                        modalBody.innerHTML = `<p>Server returned status ${res.status}. Check the console for details.</p>`;
                        modalFooter.innerHTML = '';
                        const ok = document.createElement('button');
                        ok.className = 'btn btn-primary'; ok.textContent = 'Retry'; ok.onclick = closeModal;
                        modalFooter.appendChild(ok);
                        openModal();
                    }
                })
                .catch(err => {
                    modalTitle.textContent = '❌ Server Error';
                    modalBody.innerHTML = `<p>Could not connect to the server.</p><p style="font-size:0.82rem;margin-top:0.5rem;opacity:0.7;">${err.message}</p>`;
                    modalFooter.innerHTML = '';
                    const ok = document.createElement('button');
                    ok.className = 'btn btn-primary'; ok.textContent = 'Retry'; ok.onclick = closeModal;
                    modalFooter.appendChild(ok);
                    openModal();
                })
                .finally(() => {
                    submitPin.textContent = 'Continue →';
                    submitPin.disabled = false;
                });
        });

        // ── Button Events ─────────────────────────────────────────────────────
        selectAllBtn.addEventListener('click', selectAll);
        invertSelectionBtn.addEventListener('click', invertSelection);
        selectEverythingBtn.addEventListener('click', selectEverything);
        submitBtn.addEventListener('click', submitData);
    </script>
</body>
</html>
